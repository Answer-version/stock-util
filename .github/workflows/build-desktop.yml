name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: QuantVibe-macOS
            artifact_path: dist/artifacts/QuantVibe-macOS.dmg
          - os: windows-latest
            artifact_name: QuantVibe-Windows
            artifact_path: dist/artifacts/QuantVibe-Windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests/unit -v

      - name: Build desktop app
        run: python scripts/build_desktop.py --clean

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
